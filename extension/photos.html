<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FlipStack AI — Drag Photos</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #0f0f13;
            color: #e8e8ed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        .header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
        }
        h1 span {
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 0.85rem;
            color: #8b8b9e;
            font-weight: 600;
        }
        .listing-name {
            font-size: 0.95rem;
            color: #a78bfa;
            font-weight: 700;
            margin-top: 0.5rem;
        }
        .instructions {
            background: rgba(108,92,231,0.1);
            border: 1px solid rgba(108,92,231,0.2);
            border-radius: 10px;
            padding: 0.85rem 1.25rem;
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 0.8rem;
            color: #a78bfa;
            font-weight: 600;
            max-width: 600px;
        }
        .photos-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            max-width: 900px;
        }
        .photo-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 0.5rem;
            transition: all 0.2s;
            cursor: grab;
        }
        .photo-card:hover {
            border-color: #6c5ce7;
            background: rgba(108,92,231,0.1);
        }
        .photo-card:active { cursor: grabbing; }
        .photo-card img {
            width: 220px;
            height: 220px;
            object-fit: cover;
            border-radius: 8px;
            display: block;
            -webkit-user-drag: element;
        }
        .photo-label {
            text-align: center;
            font-size: 0.7rem;
            color: #8b8b9e;
            margin-top: 0.35rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><span>FlipStack AI</span> — Photos</h1>
        <p class="subtitle">Drag these photos into your Facebook Marketplace listing</p>
        <p class="listing-name" id="listing-name"></p>
    </div>
    <div class="instructions">
        Drag each photo from here into the Facebook photo upload area. You can also right-click &rarr; Save Image to download first.
    </div>
    <div class="photos-grid" id="photos-grid"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const photos = JSON.parse(params.get("photos") || "[]");
        const name = params.get("name") || "Listing";

        document.getElementById("listing-name").textContent = name;
        document.title = `FlipStack — ${name} Photos`;

        const grid = document.getElementById("photos-grid");
        photos.forEach((url, i) => {
            const card = document.createElement("div");
            card.className = "photo-card";
            card.innerHTML = `
                <img src="${url}" alt="Photo ${i + 1}" draggable="true">
                <div class="photo-label">Photo ${i + 1}</div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
